name: Build & Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Configure Docker networking for tests
        run: sudo iptables -I INPUT -i docker0 -j ACCEPT || true

      - name: Build with Maven
        run: |
          DOCKER_HOST_IP=$(docker network inspect bridge \
            -f '{{range .IPAM.Config}}{{.Gateway}}{{end}}' 2>/dev/null)
          echo "Docker bridge gateway: '${DOCKER_HOST_IP}'"
          mvn -B --no-transfer-progress package \
            ${DOCKER_HOST_IP:+-Dtest.host="$DOCKER_HOST_IP"}
